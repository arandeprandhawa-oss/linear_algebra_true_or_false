<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linear Algebra · True or False</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FAF9F6;--surface:#FFFFFF;--surface-2:#F1EFE8;
  --text:#1F1F1E;--text-2:#5F5E5A;--text-3:#888780;
  --border:rgba(0,0,0,0.09);--border-2:rgba(0,0,0,0.16);
  --radius:8px;--radius-lg:14px;
  --blue:#185FA5;--blue-dk:#0C447C;--blue-lt:#E6F1FB;
  --green:#2E6B0A;--green-bg:#EAF3DE;--green-bd:#7BBD4A;
  --red:#9B2828;--red-bg:#FCEBEB;--red-bd:#DC4848;
  --yellow-bg:#FFFBEA;--yellow-bd:#E5C200;--yellow:#7A6100;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.wrap{padding:1.25rem 1rem 3rem;max-width:600px;margin:0 auto}

/* ── UNIT TABS ── */
.unit-tabs{display:flex;gap:2px;align-items:flex-end;border-bottom:0.5px solid var(--border-2);padding:0 2px;margin-bottom:1.25rem;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.unit-tabs::-webkit-scrollbar{display:none}
.unit-tab{padding:9px 16px 10px;font-size:13px;font-weight:500;color:var(--text-3);background:transparent;border:0.5px solid transparent;border-bottom:none;border-radius:var(--radius) var(--radius) 0 0;white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center;gap:6px;cursor:pointer;font-family:inherit;transition:background .15s,color .15s}
.unit-tab:hover{color:var(--text-2);background:rgba(0,0,0,.025)}
.unit-tab.active{background:var(--bg);color:var(--text);border-color:var(--border-2);margin-bottom:-0.5px;cursor:default}
.unit-tab .utag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:999px;background:rgba(0,0,0,.06);color:var(--text-3)}
.unit-tab.active .utag{background:var(--blue);color:#fff}

/* ── LOBBY ── */
.lobby{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1.75rem 1.5rem}
.lobby-title{font-size:19px;font-weight:500;margin-bottom:3px}
.lobby-sub{font-size:13px;color:var(--text-3);margin-bottom:1.5rem}
.section-lbl{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text-3);margin-bottom:8px}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.25rem}
.chip{padding:6px 12px;border-radius:20px;border:0.5px solid var(--border-2);background:var(--surface-2);font-size:13px;cursor:pointer;color:var(--text-2);font-family:inherit;display:inline-flex;align-items:center;gap:5px;transition:background .1s,color .1s}
.chip:hover{background:#E8E5DA}
.chip.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.chip .cnt{font-size:11px;opacity:.7}
.count-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.5rem}
.count-chip{padding:8px 16px;border-radius:var(--radius);border:0.5px solid var(--border-2);background:var(--surface-2);font-size:14px;font-weight:500;cursor:pointer;color:var(--text-2);font-family:inherit;text-align:center;min-width:52px;transition:background .1s,color .1s}
.count-chip:hover{background:#E8E5DA}
.count-chip.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.start-btn{width:100%;padding:13px;border-radius:var(--radius);border:none;background:var(--blue);color:#fff;font-size:16px;font-weight:500;cursor:pointer;font-family:inherit;transition:background .15s}
.start-btn:hover{background:var(--blue-dk)}

/* ── GAME ── */
.game-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.game-meta .cnum{font-size:13px;color:var(--text-3)}
.game-meta .cnum b{color:var(--text);font-weight:500}
.game-meta .cscore{font-size:13px;font-weight:600;color:var(--blue)}
.pbar{height:4px;background:var(--surface-2);border-radius:2px;margin-bottom:16px;overflow:hidden}
.pbar-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .35s ease}

.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:2.25rem 1.75rem;margin-bottom:14px;display:flex;flex-direction:column;align-items:center;gap:12px;min-height:200px;justify-content:center;text-align:center}
.cat-badge{font-size:11px;font-weight:600;padding:3px 11px;border-radius:20px;display:inline-block;letter-spacing:.02em}
.statement{font-size:19px;font-weight:400;line-height:1.55;color:var(--text);max-width:480px}
.statement code{font-family:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;background:var(--surface-2);padding:1px 5px;border-radius:4px;font-size:.9em}

/* T / F buttons */
.tf-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.tf-btn{padding:16px 24px;border-radius:var(--radius-lg);border:1.5px solid transparent;font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .1s,opacity .15s,background .1s}
.tf-btn:active{transform:scale(.97)}
.tf-btn.t{background:var(--green-bg);color:var(--green);border-color:var(--green-bd)}
.tf-btn.f{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}
.tf-btn:hover.t{background:#D5EDBE}
.tf-btn:hover.f{background:#F8D5D5}
.tf-btn.sel-ok{background:var(--green);color:#fff;border-color:var(--green)}
.tf-btn.sel-bad{background:var(--red);color:#fff;border-color:var(--red)}
.tf-btn.reveal-ok{background:var(--green);color:#fff;border-color:var(--green)}
.tf-btn.dim{opacity:.3;cursor:default;pointer-events:none}
.tf-btn:disabled{cursor:default}
.kb-hint{text-align:center;font-size:11px;color:var(--text-3);margin-bottom:10px;letter-spacing:.01em}
.kb-hint kbd{background:var(--surface-2);border:0.5px solid var(--border-2);border-radius:4px;padding:1px 5px;font-size:11px;font-family:inherit}

/* Feedback */
.feedback{border-radius:var(--radius);padding:12px 16px;margin-bottom:12px}
.feedback.ok{background:var(--green-bg);border:0.5px solid var(--green-bd)}
.feedback.bad{background:var(--red-bg);border:0.5px solid var(--red-bd)}
.fb-label{font-size:13px;font-weight:700;margin-bottom:3px}
.fb-label.ok{color:var(--green)}
.fb-label.bad{color:var(--red)}
.fb-correct{font-size:12px;font-weight:600;color:var(--green);margin-bottom:6px}
.fb-explain{font-size:13px;color:var(--text-2);line-height:1.55}

.next-btn{width:100%;padding:11px;border-radius:var(--radius);border:0.5px solid var(--border-2);background:var(--surface-2);font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;color:var(--text);transition:background .15s}
.next-btn:hover{background:#E8E5DA}
.auto-wrap{height:3px;background:var(--surface-2);border-radius:2px;margin-top:8px;overflow:hidden}
.auto-bar{height:100%;width:100%;transform-origin:left;animation:shrink 2.5s linear forwards}
.auto-bar.ok{background:var(--green)}
.auto-bar.bad{background:var(--red)}
@keyframes shrink{from{transform:scaleX(1)}to{transform:scaleX(0)}}

/* ── RESULTS ── */
.results{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:2rem 1.5rem;text-align:center}
.res-label{font-size:12px;color:var(--text-3);letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px}
.res-num{font-size:58px;font-weight:500;line-height:1;color:var(--text)}
.res-denom{font-size:26px;color:var(--text-3);font-weight:400}
.res-pct{font-size:17px;color:var(--text-2);margin-top:4px;font-weight:500}
.res-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:1.5rem}
.res-actions button{padding:12px;border-radius:var(--radius);border:0.5px solid var(--border-2);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}
.res-actions button.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.res-actions button.primary:hover{background:var(--blue-dk)}
.res-actions button:not(.primary){background:var(--surface);color:var(--text)}
.res-actions button:not(.primary):hover{background:var(--surface-2)}

.review{margin-top:1.75rem;text-align:left}
.review-hd{font-size:13px;font-weight:600;color:var(--text-2);margin-bottom:10px}
.ri{background:var(--surface);border:0.5px solid var(--red-bd);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px}
.ri-stmt{font-size:14px;color:var(--text);margin-bottom:5px;line-height:1.45}
.ri-yours{font-size:12px;color:var(--red);margin-bottom:3px}
.ri-ans{font-size:12px;font-weight:600;color:var(--green);margin-bottom:6px}
.ri-exp{font-size:12px;color:var(--text-2);line-height:1.5}

/* ── CATEGORY BADGE COLOURS ── */
.cb-systems{background:#FFF8E1;color:#B56000}
.cb-span{background:#F3E5F5;color:#6A1B9A}
.cb-independence{background:#EAF3DE;color:#2E6B0A}
.cb-matrices{background:#E6F1FB;color:#0C447C}
.cb-inverses{background:#EDE7F6;color:#512DA8}
.cb-lu{background:#E0F2F1;color:#00695C}
.cb-determinants{background:#FCEBEB;color:#9B2828}
.cb-transformations{background:#FBEAF0;color:#880E4F}
.cb-subspaces{background:#FFF3E0;color:#BF360C}
.cb-eigenvalues{background:#E8EAF6;color:#283593}
.cb-markov{background:#F1F8E9;color:#33691E}

/* ── NOTICE ── */
.notice{background:var(--red-bg);border:0.5px solid var(--red-bd);color:var(--red);padding:12px 16px;border-radius:var(--radius);font-size:13px;margin-bottom:1rem}

/* ── RESPONSIVE ── */
@media(max-width:480px){
  .wrap{padding:1rem .75rem 2rem}
  .lobby,.results{padding:1.5rem 1.25rem}
  .card{padding:1.75rem 1.25rem;min-height:180px}
  .statement{font-size:16px}
  .tf-btn{padding:14px 12px;font-size:15px}
  .res-num{font-size:48px}
  .res-denom{font-size:22px}
}
</style>
</head>
<body>
<div class="wrap">
  <nav class="unit-tabs" id="unit-tabs"></nav>
  <div id="screen-lobby"></div>
  <div id="screen-game" style="display:none"></div>
  <div id="screen-results" style="display:none"></div>
</div>

<script src="etapes/registry.js"></script>
<script>
// ── URL: which unit? ──────────────────────────────────────────────────────
const params   = new URLSearchParams(window.location.search);
const unitId   = params.get('unit') || window.DEFAULT_ETAPE || 'e1';

// ── BUILD TAB BAR ─────────────────────────────────────────────────────────
(function(){
  const nav = document.getElementById('unit-tabs');
  nav.innerHTML = window.ETAPES.map(u => {
    const active = u.id === unitId;
    const url    = 'index.html?unit=' + u.id;
    if(active) return `<span class="unit-tab active" aria-current="page">${escH(u.label)} <span class="utag">${escH(u.sublabel)}</span></span>`;
    return `<a class="unit-tab" href="${url}">${escH(u.label)} <span class="utag">${escH(u.sublabel)}</span></a>`;
  }).join('');
})();

// ── STATE ─────────────────────────────────────────────────────────────────
let VOCAB  = [];
let CLABELS = {};
let selCat    = 'all';
let selCount  = 20;
let gameCards = [];
let gameIdx   = 0;
let gameScore = 0;
let gameMiss  = [];
let answered  = false;
let autoTimer = null;
const COUNT_OPTS = [10, 20, 30, 'All'];

// ── UTILS ─────────────────────────────────────────────────────────────────
function escH(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function show(screen){
  ['lobby','game','results'].forEach(s =>
    document.getElementById('screen-'+s).style.display = s===screen ? 'block' : 'none');
}
function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function cbClass(cat){ return 'cat-badge cb-'+(cat||'matrices'); }

// ── LOAD VOCAB FILE ───────────────────────────────────────────────────────
function loadVocab(src){
  return new Promise((res,rej)=>{
    const old = document.getElementById('_vocab');
    if(old) old.remove();
    const s = document.createElement('script');
    s.id  = '_vocab';
    s.src = src + '?_=' + Date.now();
    s.onload  = () => { VOCAB=window.ETAPE_DATA.vocab; CLABELS=window.ETAPE_DATA.categoryLabels; res(); };
    s.onerror = () => rej(new Error('Could not load ' + src));
    document.head.appendChild(s);
  });
}

// ── LOBBY ─────────────────────────────────────────────────────────────────
function renderLobby(){
  const unit  = window.ETAPES.find(u => u.id === unitId) || {};
  const sizes = { all: VOCAB.length };
  for(const v of VOCAB) sizes[v.category] = (sizes[v.category]||0)+1;

  const chips = Object.keys(CLABELS).map(k=>{
    const active = k===selCat ? ' active' : '';
    return `<button class="chip${active}" data-cat="${escH(k)}">${escH(CLABELS[k])} <span class="cnt">${sizes[k]||0}</span></button>`;
  }).join('');

  const poolSize = selCat==='all' ? VOCAB.length : (sizes[selCat]||0);
  const countChips = COUNT_OPTS.map(n=>{
    const val    = n==='All' ? 9999 : n;
    const active = selCount===val ? ' active' : '';
    const lbl    = n==='All' ? `All (${poolSize})` : (n > poolSize ? `${n}` : n);
    return `<button class="count-chip${active}" data-count="${val}">${lbl}</button>`;
  }).join('');

  document.getElementById('screen-lobby').innerHTML = `
    <div class="lobby">
      <div class="lobby-title">${escH(unit.titleMulti||'Linear Algebra · True or False')}</div>
      <div class="lobby-sub">${escH(unit.sub||'')}</div>
      <div class="section-lbl">Topic</div>
      <div class="chip-row" id="cat-chips">${chips}</div>
      <div class="section-lbl">Questions</div>
      <div class="count-row" id="count-chips">${countChips}</div>
      <button class="start-btn" id="start-btn">Start ▶</button>
    </div>`;

  document.querySelectorAll('#cat-chips .chip').forEach(c=>c.addEventListener('click',()=>{selCat=c.dataset.cat;selCount=20;renderLobby();}));
  document.querySelectorAll('#count-chips .count-chip').forEach(c=>c.addEventListener('click',()=>{selCount=parseInt(c.dataset.count);renderLobby();}));
  document.getElementById('start-btn').addEventListener('click', startGame);
  show('lobby');
}

// ── GAME ──────────────────────────────────────────────────────────────────
function buildCards(){
  let pool = VOCAB.slice();
  if(selCat!=='all') pool = pool.filter(v=>v.category===selCat);
  if(!pool.length) pool = VOCAB.slice();
  pool = shuffle(pool);
  return pool.slice(0, Math.min(selCount, pool.length));
}

function startGame(){
  gameCards = buildCards();
  gameIdx   = 0;
  gameScore = 0;
  gameMiss  = [];
  answered  = false;
  if(autoTimer){clearTimeout(autoTimer);autoTimer=null;}
  document.addEventListener('keydown', keyHandler);
  renderGameShell();
  showCard();
  show('game');
}

function renderGameShell(){
  document.getElementById('screen-game').innerHTML = `
    <div class="game-meta">
      <div class="cnum">Card <b id="g-num">1</b> / ${gameCards.length}</div>
      <div class="cscore" id="g-score">0</div>
    </div>
    <div class="pbar"><div class="pbar-fill" id="g-bar" style="width:0%"></div></div>
    <div class="card">
      <span class="cat-badge" id="g-badge"></span>
      <div class="statement" id="g-stmt"></div>
    </div>
    <div id="g-feedback"></div>
    <div class="kb-hint" id="g-kbhint">Press <kbd>T</kbd> for True &nbsp;·&nbsp; <kbd>F</kbd> for False</div>
    <div class="tf-row">
      <button class="tf-btn t" id="btn-t" onclick="answer(true)">✓ True</button>
      <button class="tf-btn f" id="btn-f" onclick="answer(false)">✗ False</button>
    </div>
    <div id="g-next"></div>`;
}

function showCard(){
  if(gameIdx >= gameCards.length){ endGame(); return; }
  answered = false;
  const v = gameCards[gameIdx];
  document.getElementById('g-num').textContent  = gameIdx+1;
  document.getElementById('g-score').textContent= gameScore;
  document.getElementById('g-bar').style.width  = (gameIdx/gameCards.length*100)+'%';
  const badge = document.getElementById('g-badge');
  badge.textContent  = CLABELS[v.category]||v.category;
  badge.className    = cbClass(v.category);
  document.getElementById('g-stmt').textContent = v.en;
  document.getElementById('g-feedback').innerHTML = '';
  document.getElementById('g-next').innerHTML     = '';
  document.getElementById('g-kbhint').style.display = '';
  const btnT = document.getElementById('btn-t');
  const btnF = document.getElementById('btn-f');
  btnT.disabled=false; btnT.className='tf-btn t';
  btnF.disabled=false; btnF.className='tf-btn f';
}

function keyHandler(e){
  if(document.getElementById('screen-game').style.display==='none') return;
  if(!answered && (e.key==='t'||e.key==='T')){ answer(true); }
  else if(!answered && (e.key==='f'||e.key==='F')){ answer(false); }
  else if(answered && (e.key==='Enter'||e.key===' ')){ e.preventDefault(); advance(); }
}

function answer(isTrue){
  if(answered) return;
  answered = true;
  const v     = gameCards[gameIdx];
  const right = (v.fr.toLowerCase()==='true') === isTrue;
  const btnT  = document.getElementById('btn-t');
  const btnF  = document.getElementById('btn-f');
  btnT.disabled=true; btnF.disabled=true;
  document.getElementById('g-kbhint').style.display='none';

  // Button highlighting
  if(isTrue){
    btnT.className = 'tf-btn t ' + (right ? 'sel-ok' : 'sel-bad');
    btnF.className = 'tf-btn f dim';
  } else {
    btnF.className = 'tf-btn f ' + (right ? 'sel-ok' : 'sel-bad');
    btnT.className = 'tf-btn t dim';
  }
  // Always reveal correct answer
  if(!right){
    if(v.fr.toLowerCase()==='true')  btnT.className = 'tf-btn t reveal-ok';
    if(v.fr.toLowerCase()==='false') btnF.className = 'tf-btn f reveal-ok';
  }

  if(right) gameScore++;
  else gameMiss.push({v, given: isTrue?'True':'False'});

  // Feedback
  document.getElementById('g-feedback').innerHTML = `
    <div class="feedback ${right?'ok':'bad'}">
      <div class="fb-label ${right?'ok':'bad'}">${right?'✓ Correct!':'✗ Incorrect'}</div>
      ${!right ? `<div class="fb-correct">Answer: ${escH(v.fr)}</div>` : ''}
      ${v.explanation ? `<div class="fb-explain">${escH(v.explanation)}</div>` : ''}
    </div>`;

  // Next button + auto bar
  const isLast = gameIdx >= gameCards.length-1;
  document.getElementById('g-next').innerHTML = `
    <button class="next-btn" id="next-btn">${isLast ? 'See Results →' : 'Next →'}</button>
    <div class="auto-wrap"><div class="auto-bar ${right?'ok':'bad'}"></div></div>`;
  document.getElementById('next-btn').addEventListener('click',()=>{clearTimeout(autoTimer);autoTimer=null;advance();});
  autoTimer = setTimeout(()=>{autoTimer=null;advance();}, 2500);
}

function advance(){
  gameIdx++;
  if(gameIdx >= gameCards.length) endGame();
  else showCard();
}

// ── RESULTS ───────────────────────────────────────────────────────────────
function endGame(){
  document.removeEventListener('keydown', keyHandler);
  show('results');
  const pct = gameCards.length ? Math.round(gameScore/gameCards.length*100) : 0;

  const missHtml = gameMiss.length===0 ? '' : `
    <div class="review">
      <div class="review-hd">Missed — ${gameMiss.length} card${gameMiss.length>1?'s':''}</div>
      ${gameMiss.map(m=>`
        <div class="ri">
          <div class="ri-stmt">${escH(m.v.en)}</div>
          <div class="ri-yours">Your answer: ${escH(m.given)}</div>
          <div class="ri-ans">Correct: ${escH(m.v.fr)}</div>
          ${m.v.explanation ? `<div class="ri-exp">${escH(m.v.explanation)}</div>` : ''}
        </div>`).join('')}
    </div>`;

  document.getElementById('screen-results').innerHTML = `
    <div class="results">
      <div class="res-label">Quiz complete</div>
      <div class="res-num">${gameScore}<span class="res-denom"> / ${gameCards.length}</span></div>
      <div class="res-pct">${pct}%</div>
      <div class="res-actions">
        <button class="primary" id="retry-btn">Try Again</button>
        <button id="lobby-btn">Change Setup</button>
      </div>
      ${missHtml}
    </div>`;
  document.getElementById('retry-btn').addEventListener('click',startGame);
  document.getElementById('lobby-btn').addEventListener('click',()=>{document.removeEventListener('keydown',keyHandler);renderLobby();});
}

// ── INIT ──────────────────────────────────────────────────────────────────
const unitMeta = window.ETAPES.find(u=>u.id===unitId);
if(!unitMeta){
  document.getElementById('screen-lobby').innerHTML = '<div class="notice">Unknown unit. Check the URL parameter.</div>';
  show('lobby');
} else {
  loadVocab(unitMeta.file)
    .then(renderLobby)
    .catch(err=>{
      document.getElementById('screen-lobby').innerHTML = `<div class="notice">Could not load cards: ${escH(err.message)}</div>`;
      show('lobby');
    });
}
</script>
</body>
</html>
