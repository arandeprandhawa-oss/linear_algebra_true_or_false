<script>
(function bootEtape(){
window.CURRENT_ETAPE_ID = 'e2';

window.ETAPE_SOLO_MAP = {
  e1: 'solo1.html',
  e2: 'solo.html',
  e3: 'solo3.html',
  e4: 'solo4.html'
};

window.ETAPE_LOBBY_MAP = {
  e1: 'etape1.html',
  e2: 'index.html',
  e3: 'etape3.html',
  e4: 'etape4.html'
};
  const tabsEl = document.getElementById('etape-tabs');
  if(tabsEl){
    tabsEl.innerHTML = window.ETAPES.map(e => {
      const isActive = e.id === window.CURRENT_ETAPE_ID;
      const href = window.ETAPE_SOLO_MAP[e.id] || '#';
      if(isActive){
        return `<span class="etape-tab active" aria-current="page">${e.label} <span class="e-num">${e.sublabel}</span></span>`;
      }
      return `<a class="etape-tab" href="${href}">${e.label} <span class="e-num">${e.sublabel}</span></a>`;
    }).join('');
  }
  const me = window.ETAPES.find(e => e.id === window.CURRENT_ETAPE_ID);
  if(me){
    const h1 = document.getElementById('app-title-h1');
    const sub = document.getElementById('app-title-sub');
    if(h1) h1.textContent = me.titleSolo;
    if(sub) sub.textContent = 'Solo practice mode';
    document.title = me.titleSolo;
  }
  const back = document.getElementById('back-link');
  if(back) back.href = window.ETAPE_LOBBY_MAP[window.CURRENT_ETAPE_ID] || 'index.html';
})();
</script>
<script src="etapes/etape2.js"></script>
<script>
// ====== VOCAB DATA (loaded from etapes/etape*.js via window.ETAPE_DATA) ======
if(!window.ETAPE_DATA || !window.ETAPE_DATA.vocab){
  document.body.innerHTML = '<div style="max-width:500px;margin:3rem auto;padding:1.5rem;font-family:system-ui;color:#A32D2D">Could not load étape data. Check that <code>etapes/etape2.js</code> is reachable.</div>';
  throw new Error('ETAPE_DATA not loaded');
}
const vocab = window.ETAPE_DATA.vocab;

// ====== AUDIO PLAYBACK (added) ======
// Mirrors slugify() in generate-audio.js so we can derive the mp3 path
// directly from card.vocab.fr — no manifest lookup needed.
function audioSlug(text){
  return String(text)
    .toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/\u0153/g,"oe").replace(/\u00e6/g,"ae")
    .replace(/[^a-z0-9]+/g,"_")
    .replace(/^_+|_+$/g,"")
    .slice(0,80);
}
let _audioEl=null;
function playAudio(fr){
  if(!fr)return;
  const src="audio/"+audioSlug(fr)+".mp3";
  if(_audioEl){_audioEl.pause();_audioEl=null;}
  _audioEl=new Audio(src);
  _audioEl.play().catch(()=>{ /* file missing / autoplay blocked — ignore */ });
}

const categoryLabels = window.ETAPE_DATA.categoryLabels;

(function buildCategoryFilters(){
  const wrap = document.getElementById('cat-filters');
  if(!wrap) return;
  const order = Object.keys(categoryLabels);
  if(!order.includes('all')) order.unshift('all');
  const buttons = order.map(k => {
    const label = categoryLabels[k] || k;
    const active = k === 'all' ? ' active-all' : '';
    return `<button class="filter-btn${active}" data-cat="${k}" onclick="setFilter('${k}')">${label}</button>`;
  }).join('');
  wrap.insertAdjacentHTML('beforeend', buttons);
})();

const accentMap=[[/[àâä]/g,'a'],[/[éèêë]/g,'e'],[/[îï]/g,'i'],[/[ôö]/g,'o'],[/[ùûü]/g,'u'],[/ç/g,'c'],[/œ/g,'oe']];

function normaliseBase(s){
  return s.toLowerCase().trim()
    .replace(/[''`]/g,"'")
    .replace(/[?!.…]/g,'')
    .replace(/\s+/g,' ')
    .trim();
}

function stripAccents(s){
  let r=s;
  accentMap.forEach(([p,rep])=>r=r.replace(p,rep));
  return r;
}

function isCorrect(typed,v){
  const t=normaliseBase(typed);
  return v.alts.some(answer=>{
    const a=normaliseBase(answer);
    const tH = v.needsHyphen ? t : t.replace(/-/g,' ');
    const aH = v.needsHyphen ? a : a.replace(/-/g,' ');
    // STRICT: must match WITH accents intact, not just accent-stripped
    return tH===aH;
  });
}

function isWrongGender(typed,v){
  // If this card has a specific gender, check if the user typed a known opposite-gender form.
  if(v.gender!=='m'&&v.gender!=='f')return false;
  const opposite=v.gender==='m'?'f':'m';
  const coreA=v.en.replace(/\s*\(.*?\)\s*/g,'').trim().toLowerCase();
  for(const other of vocab){
    if(other.gender!==opposite)continue;
    if(other.category!==v.category)continue;
    const coreB=other.en.replace(/\s*\(.*?\)\s*/g,'').trim().toLowerCase();
    // Match if English cores are equal, OR English cores share words, OR they are sibling
    // adjective/article pairs (same category and the user typed exactly the opposite-gender French answer).
    let related=(coreA===coreB);
    if(!related){
      // Adjacent-card heuristic: many of our masc/fem pairs are listed back-to-back.
      const idxA=vocab.indexOf(v);
      const idxB=vocab.indexOf(other);
      if(Math.abs(idxA-idxB)<=2)related=true;
    }
    if(!related)continue;
    const matches=other.alts.some(answer=>{
      const a=normaliseBase(answer);
      const aH=other.needsHyphen?a:a.replace(/-/g,' ');
      const tH=other.needsHyphen?normaliseBase(typed):normaliseBase(typed).replace(/-/g,' ');
      return stripAccents(tH)===stripAccents(aH);
    });
    if(matches)return true;
  }
  return false;
}

function isWrongArticle(typed,v){
  // For single-gender nouns where the user is asked to guess the gender,
  // detect if they typed the right noun but the wrong article (un vs une, or le vs la).
  if(!v.guessGender)return false;
  const t=normaliseBase(typed);
  const a=normaliseBase(v.alts[0]);
  // Try swapping common article pairs in the typed answer
  const swaps=[
    [/^un /,'une '],[/^une /,'un '],
    [/^le /,'la '],[/^la /,'le '],
  ];
  for(const[from,to]of swaps){
    if(from.test(t)){
      const swapped=t.replace(from,to);
      if(stripAccents(swapped)===stripAccents(a))return true;
    }
  }
  return false;
}

function getMissing(typed,v){
  const t=normaliseBase(typed);
  const answer=normaliseBase(v.alts[0]);
  const msgs=[];
  if(isWrongArticle(typed,v)){
    msgs.push(v.gender==='m'?'wrong article — should be MASCULINE (un/le)':'wrong article — should be FEMININE (une/la)');
    return msgs;
  }
  if(isWrongGender(typed,v)){
    msgs.push(v.gender==='m'?'that is the FEMININE form, need MASCULINE':'that is the MASCULINE form, need FEMININE');
    return msgs;
  }
  if(v.needsHyphen){
    const tHyphens=(t.match(/-/g)||[]).length;
    const aHyphens=(answer.match(/-/g)||[]).length;
    if(tHyphens!==aHyphens) msgs.push('missing hyphen(s)');
  }
  const tNoAccent=stripAccents(normaliseBase(typed));
  const aNoAccent=stripAccents(answer);
  if(tNoAccent===aNoAccent && msgs.length===0){
    msgs.push('check accents');
  }
  return msgs;
}

function escH(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtIvl(m){if(m<60)return m+'m';if(m<1440)return Math.round(m/60)+'h';return Math.round(m/1440)+'d';}

function initCard(v,i){return{id:i,vocab:v,state:'new',interval:0,easeFactor:2.5,step:0,steps:[1,10],due:0,reps:0};}
function previewIvl(card,r){
  if(card.state==='new'||card.state==='learning'){
    if(r===0)return fmtIvl(card.steps[0]);
    if(r===1)return fmtIvl(card.steps[Math.max(0,card.step-1)]);
    if(r===2){if(card.step<card.steps.length-1)return fmtIvl(card.steps[card.step+1]);return fmtIvl(Math.max(card.interval,1)*1440);}
    return fmtIvl(Math.max(card.interval,1)*1440);
  }
  if(r===0)return fmtIvl(card.steps[0]);
  if(r===1)return fmtIvl(Math.round(card.interval*1.2)*1440);
  if(r===2)return fmtIvl(Math.round(card.interval*card.easeFactor)*1440);
  return fmtIvl(Math.round(card.interval*card.easeFactor*1.3)*1440);
}
function applyRating(card,r){
  const now=Date.now();
  if(card.state==='new'||card.state==='learning'){
    card.state='learning';
    if(r===0){card.step=0;card.due=now+card.steps[0]*60000;}
    else if(r===1){card.step=Math.max(0,card.step-1);card.due=now+card.steps[card.step]*60000;}
    else if(r===2){if(card.step<card.steps.length-1){card.step++;card.due=now+card.steps[card.step]*60000;}else{card.state='review';card.interval=Math.max(card.interval,1);card.due=now+card.interval*86400000;}}
    else{card.state='review';card.interval=Math.max(card.interval*card.easeFactor,1);card.due=now+card.interval*86400000;}
  } else {
    if(r===0){card.state='learning';card.step=0;card.due=now+card.steps[0]*60000;card.easeFactor=Math.max(1.3,card.easeFactor-0.2);}
    else if(r===1){card.interval=Math.round(card.interval*1.2)||1;card.easeFactor=Math.max(1.3,card.easeFactor-0.15);card.due=now+card.interval*86400000;}
    else if(r===2){card.interval=Math.round(card.interval*card.easeFactor)||1;card.due=now+card.interval*86400000;}
    else{card.interval=Math.round(card.interval*card.easeFactor*1.3)||1;card.easeFactor=card.easeFactor+0.15;card.due=now+card.interval*86400000;}
  }
  card.reps++;
}
function autoRate(card,ok,elapsed){
  if(!ok)return 0;
  if(elapsed<9000)return 3;
  if(elapsed<13000)return 2;
  return 1;
}

let allCards=vocab.map((v,i)=>initCard(v,i));
let mistakes=[];
let current=null;
let answered=false;
let cardStartTime=0;
let autoTimer=null;
let filter='all';
let genderFilter='all';
const autoDelay=1500;

function matchesFilters(card){
  if(filter!=='all'&&card.vocab.category!==filter)return false;
  if(genderFilter!=='all'&&card.vocab.gender!==genderFilter)return false;
  return true;
}

function getRandomItem(arr){
  return arr[Math.floor(Math.random() * arr.length)];
}

function getNext(){
  const now = Date.now();
  const pool = allCards.filter(matchesFilters);
  if(pool.length === 0) return null;

  const learningDue = pool.filter(c => c.state === 'learning' && c.due <= now);
  if(learningDue.length) return getRandomItem(learningDue);

  const newCards = pool.filter(c => c.state === 'new');
  if(newCards.length) return getRandomItem(newCards);

  const reviewDue = pool.filter(c => c.state === 'review' && c.due <= now);
  if(reviewDue.length) return getRandomItem(reviewDue);

  const upcoming = pool.slice().sort((a,b) => a.due - b.due);
  return upcoming[0] || null;
}
function updateStats(){
  const pool=allCards.filter(matchesFilters);
  const now=Date.now();
  document.getElementById('cnt-new').textContent=pool.filter(c=>c.state==='new').length;
  document.getElementById('cnt-learn').textContent=pool.filter(c=>c.state==='learning').length;
  document.getElementById('cnt-due').textContent=pool.filter(c=>c.state==='review'&&c.due<=now).length;
  document.getElementById('cnt-mistakes').textContent=mistakes.length;
}
function badgeHTML(g){
  if(g==='m')return '<span class="gender-badge gb-m">Masculine</span>';
  if(g==='f')return '<span class="gender-badge gb-f">Feminine</span>';
  return '<span class="gender-badge gb-both">Same form</span>';
}
function categoryBadge(cat){
  const label = (categoryLabels && categoryLabels[cat]) || cat;
  return '<span class="cat-badge cb-'+cat+'">'+label+'</span>';
}
function showCard(card){
  current=card;answered=false;cardStartTime=Date.now();
  const badges=document.getElementById('top-badges');
  const tb=document.createElement('span');
  tb.className='card-badge '+(card.state==='new'?'badge-new':card.state==='learning'?'badge-learn':'badge-review');
  tb.textContent=card.state==='new'?'New':card.state==='learning'?'Learning':'Review';
  badges.innerHTML='';badges.appendChild(tb);
  badges.insertAdjacentHTML('beforeend',categoryBadge(card.vocab.category));
  if(!card.vocab.guessGender){
    badges.insertAdjacentHTML('beforeend',badgeHTML(card.vocab.gender));
  }
  document.getElementById('prompt').textContent=card.vocab.en;
  const hints=[];
  if(!card.vocab.guessGender){
    if(card.vocab.gender==='m') hints.push('use the MASCULINE form');
    else if(card.vocab.gender==='f') hints.push('use the FEMININE form');
  }
  if(card.vocab.needsHyphen) hints.push('hyphen required');
  const hintEl=document.getElementById('hint');
  hintEl.textContent=hints.length?'Note: '+hints.join(' • '):'';
  hintEl.className='hint'+(!card.vocab.guessGender&&card.vocab.gender==='m'?' hint-m':!card.vocab.guessGender&&card.vocab.gender==='f'?' hint-f':'');
  const inp=document.getElementById('answer-input');
  inp.value='';inp.className='';inp.disabled=false;
  document.querySelectorAll('.accent-btn').forEach(b=>b.disabled=false);
  document.getElementById('check-btn').disabled=false;
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback-text';
  document.getElementById('answer-box-wrap').innerHTML='';
  document.getElementById('rating-wrap').style.display='none';
  document.getElementById('auto-bar').style.width='0';
  ['btn-again','btn-hard','btn-good','btn-easy'].forEach(id=>document.getElementById(id).classList.remove('preselected'));
  updateStats();
  setTimeout(()=>inp.focus(),50);
}
function showRatingAndAutoAdvance(ok,elapsed){
  const suggested=autoRate(current,ok,elapsed);
  document.getElementById('ivl-again').textContent=previewIvl(current,0);
  document.getElementById('ivl-hard').textContent=previewIvl(current,1);
  document.getElementById('ivl-good').textContent=previewIvl(current,2);
  document.getElementById('ivl-easy').textContent=previewIvl(current,3);
  document.getElementById('rating-wrap').style.display='block';
  const ids=['btn-again','btn-hard','btn-good','btn-easy'];
  const cls=['again','hard','good','easy'];
  ids.forEach(id=>document.getElementById(id).classList.remove('preselected'));
  document.getElementById(ids[suggested]).classList.add('preselected');
  const bar=document.getElementById('auto-bar');
  bar.className='auto-bar '+cls[suggested];bar.style.width='100%';
  let step=0,steps=60;
  autoTimer=setInterval(()=>{
    step++;bar.style.width=Math.max(0,100-Math.round(step/steps*100))+'%';
    if(step>=steps){clearInterval(autoTimer);autoTimer=null;rate(suggested);}
  },autoDelay/steps);
}
function revealResult(ok,displayAnswer,extraMsg){
  const fb=document.getElementById('feedback');
  fb.textContent=ok?'Correct!':(extraMsg?'Wrong — '+extraMsg:'Wrong!');
  fb.className='feedback-text '+(ok?'good':'bad');
  const box=document.createElement('div');
  box.className='answer-box '+(ok?'good':'bad');
  const txt=document.createElement('span');
  txt.textContent='Answer: '+displayAnswer;
  box.appendChild(txt);
  const spk=document.createElement('button');
  spk.type='button';spk.className='speaker-btn';spk.title='Play pronunciation';
  spk.setAttribute('aria-label','Play pronunciation');
  spk.textContent='\ud83d\udd0a';
  spk.onclick=function(){playAudio(displayAnswer);};
  box.appendChild(spk);
  document.getElementById('answer-box-wrap').innerHTML='';
  document.getElementById('answer-box-wrap').appendChild(box);
  playAudio(displayAnswer);   // auto-play the correct French on reveal
}
function addMistake(question,typed,correct){
  mistakes.push({question,typed,correct});
  document.getElementById('mistakes-section').style.display='block';
  document.getElementById('mistake-count').textContent=mistakes.length;
  const item=document.createElement('div');item.className='mistake-item';
  item.innerHTML='<div class="mq">'+escH(question)+'</div><div><div class="mlabel">You wrote</div><div class="myou">'+escH(typed||'—')+'</div></div><div><div class="mlabel">Correct answer</div><div class="mcorrect-row"><div class="mcorrect">'+escH(correct)+'</div><button class="speaker-btn" onclick="playAudio(this.previousElementSibling.textContent)" title="Play pronunciation">🔊</button></div></div>';
  document.getElementById('mistakes-list').appendChild(item);
}
function checkAnswer(){
  if(answered||!current)return;
  const typed=document.getElementById('answer-input').value.trim();
  if(!typed)return;
  answered=true;
  const elapsed=Date.now()-cardStartTime;
  const ok=isCorrect(typed,current.vocab);
  const inp=document.getElementById('answer-input');
  inp.disabled=true;inp.classList.add(ok?'ok':'bad');
  document.querySelectorAll('.accent-btn').forEach(b=>b.disabled=true);
  document.getElementById('check-btn').disabled=true;
  let extraMsg='';
  if(!ok){
    const missing=getMissing(typed,current.vocab);
    if(missing.length)extraMsg=missing.join(', ');
  }
  revealResult(ok,current.vocab.fr,extraMsg);
  if(!ok)addMistake(current.vocab.en,typed,current.vocab.fr);
  showRatingAndAutoAdvance(ok,elapsed);
  updateStats();
}
function rate(r){
  if(!current)return;
  if(autoTimer){clearInterval(autoTimer);autoTimer=null;}
  applyRating(current,r);
  const next=getNext();
  if(!next){showSummary();return;}
  showCard(next);
}
function showSummary(){
  document.getElementById('quiz-area').style.display='none';
  document.getElementById('summary-wrap').style.display='block';
  const total=allCards.reduce((a,c)=>a+c.reps,0);
  document.getElementById('sum-title').textContent=mistakes.length===0?'Perfect session!':mistakes.length<=3?'Great work!':'Session complete!';
  document.getElementById('sum-msg').textContent=total+' card'+(total===1?'':'s')+' reviewed, '+mistakes.length+' mistake'+(mistakes.length===1?'':'s')+'.';
  const sm=document.getElementById('sum-mistakes');sm.innerHTML='';
  if(mistakes.length===0){
    sm.innerHTML='<p style="color:var(--color-text-secondary);font-size:14px;margin-bottom:1rem">No mistakes this session!</p>';
  } else {
    const h=document.createElement('div');
    h.style.cssText='font-size:13px;font-weight:500;color:var(--color-text-secondary);margin-bottom:8px';
    h.textContent='Mistakes to review ('+mistakes.length+'):';sm.appendChild(h);
    mistakes.forEach(m=>{
      const item=document.createElement('div');item.className='mistake-item';
      item.innerHTML='<div class="mq">'+escH(m.question)+'</div><div><div class="mlabel">You wrote</div><div class="myou">'+escH(m.typed||'—')+'</div></div><div><div class="mlabel">Correct answer</div><div class="mcorrect-row"><div class="mcorrect">'+escH(m.correct)+'</div><button class="speaker-btn" onclick="playAudio(this.previousElementSibling.textContent)" title="Play pronunciation">🔊</button></div></div>';
      sm.appendChild(item);
    });
  }
}
function resetAll(){
  if(autoTimer){clearInterval(autoTimer);autoTimer=null;}
  allCards=vocab.map((v,i)=>initCard(v,i));mistakes=[];
  document.getElementById('mistakes-list').innerHTML='';
  document.getElementById('mistakes-section').style.display='none';
  document.getElementById('mistake-count').textContent='0';
  document.getElementById('summary-wrap').style.display='none';
  document.getElementById('quiz-area').style.display='block';
  const n=getNext();if(n)showCard(n);updateStats();
}
function setFilter(f){
  filter=f;
  document.querySelectorAll('#cat-filters .filter-btn').forEach(btn=>{
    const k = btn.dataset.cat;
    btn.className = 'filter-btn' + (k===f ? ' active-'+k : '');
  });
  resetAll();
}
function setGenderFilter(g){
  genderFilter=g;
  const map={'all':'active-all','m':'active-masc','f':'active-fem','both':'active-both-only'};
  ['all','m','f','both'].forEach(k=>{
    document.getElementById('g-'+k).className='filter-btn'+(k===g?' '+map[g]:'');
  });
  resetAll();
}
document.getElementById('answer-input').addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    if(!answered)checkAnswer();
    else{if(autoTimer){clearInterval(autoTimer);autoTimer=null;}const pre=document.querySelector('.rating-btn.preselected');if(pre)pre.click();}
  }
});
// Accent bar — clickable buttons that insert the character at the cursor position
const ACCENT_CHARS = ['à','â','ä','æ','ç','é','è','ê','ë','î','ï','ô','œ','ù','û','ü'];
function insertAccentChar(inputEl, ch){
  if(!inputEl || inputEl.disabled) return;
  const start = inputEl.selectionStart ?? inputEl.value.length;
  const end = inputEl.selectionEnd ?? inputEl.value.length;
  const before = inputEl.value.slice(0, start);
  const after = inputEl.value.slice(end);
  inputEl.value = before + ch + after;
  const newPos = start + ch.length;
  inputEl.setSelectionRange(newPos, newPos);
  inputEl.focus();
  inputEl.dispatchEvent(new Event('input', {bubbles:true}));
}
(function buildAccentBar(){
  const bar = document.getElementById('accent-bar');
  const inp = document.getElementById('answer-input');
  if(!bar || !inp) return;
  bar.innerHTML = '';
  ACCENT_CHARS.forEach(ch=>{
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'accent-btn';
    btn.textContent = ch;
    btn.tabIndex = -1;
    btn.addEventListener('mousedown', e => e.preventDefault());
    btn.addEventListener('click', () => insertAccentChar(inp, ch));
    bar.appendChild(btn);
  });
})();
const first=getNext();if(first)showCard(first);updateStats();
</script>
