<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>French Flashcards · Multiplayer MODL-1101 1st midterm</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FAF9F6;--surface:#FFFFFF;--surface-2:#F1EFE8;
  --text:#1F1F1E;--text-2:#5F5E5A;--text-3:#888780;
  --border:rgba(0,0,0,0.10);--border-2:rgba(0,0,0,0.18);
  --radius:8px;--radius-lg:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.wrap{padding:1.25rem 1rem 3rem;max-width:580px;margin:0 auto}
h2.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.app-title{text-align:center;margin-bottom:1.25rem}
.app-title h1{font-size:18px;font-weight:500;letter-spacing:-0.01em}
.app-title .sub{font-size:12px;color:var(--text-3);margin-top:2px}

/* ====== LOBBY ====== */
.lobby{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:2rem 1.5rem;text-align:center}
.lobby h2{font-size:22px;font-weight:500;margin-bottom:4px}
.lobby .lobby-sub{font-size:13px;color:var(--text-3);margin-bottom:1.5rem}
.lobby-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:1rem}
.lobby-card{background:var(--surface-2);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;transition:background 0.15s;display:flex;flex-direction:column;justify-content:center;min-height:90px}
.lobby-card:hover{background:#E8E5DA}
.lobby-card.primary{background:#185FA5;color:#fff;border-color:#185FA5}
.lobby-card.primary:hover{background:#0C447C}
.lobby-card.danger{background:#A32D2D;color:#fff;border-color:#A32D2D}
.lobby-card.danger:hover{background:#791F1F}
.lobby-card .label{font-size:12px;opacity:0.85}
.lobby-card .action{font-size:15px;font-weight:500;margin-top:2px}
.lobby-card input{width:100%;margin-top:4px;font-size:15px;font-weight:500;padding:6px 8px;border-radius:var(--radius);border:0.5px solid var(--border-2);background:var(--surface);text-align:center;letter-spacing:0.18em;text-transform:uppercase;color:var(--text);font-family:inherit;outline:none}
.lobby-card input:focus{border-color:#185FA5;box-shadow:0 0 0 2px rgba(24,95,165,0.2)}
.lobby-foot{font-size:12px;color:var(--text-3)}

/* Category & length pickers on lobby */
.picker-section{margin-top:1.25rem;text-align:left}
.picker-section h3{font-size:12px;font-weight:500;color:var(--text-3);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:8px}
.chip-row{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:6px 12px;border-radius:20px;border:0.5px solid var(--border-2);background:var(--surface-2);font-size:13px;cursor:pointer;color:var(--text-2);font-family:inherit;transition:background 0.1s}
.chip:hover{background:#E8E5DA}
.chip.active{background:#185FA5;color:#fff;border-color:#185FA5}
.chip.disabled{opacity:0.4;cursor:not-allowed;text-decoration:line-through}
.chip.disabled:hover{background:var(--surface-2)}
.length-row{display:flex;gap:6px;flex-wrap:wrap}
.length-chip{padding:8px 14px;border-radius:var(--radius);border:0.5px solid var(--border-2);background:var(--surface-2);font-size:14px;font-weight:500;cursor:pointer;color:var(--text-2);font-family:inherit;min-width:48px;text-align:center}
.length-chip:hover{background:#E8E5DA}
.length-chip.active{background:#185FA5;color:#fff;border-color:#185FA5}
.length-chip.locked{opacity:0.5;cursor:not-allowed;background:var(--surface-2)}
.length-note{font-size:12px;color:var(--text-3);margin-top:8px;font-style:italic}

/* Mistakes-so-far panel during play */
.mistakes-panel{margin-top:1.25rem}
.mistakes-panel-header{font-size:13px;font-weight:500;color:var(--text-2);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.mistakes-panel-badge{background:#FCEBEB;color:#A32D2D;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.mistake-row{background:var(--surface);border:0.5px solid #F09595;border-radius:var(--radius);padding:8px 12px;margin-bottom:6px;font-size:13px;display:grid;grid-template-columns:1fr 1fr;gap:4px 12px}
.mistake-row .mq{font-size:12px;color:var(--text-3);grid-column:1/-1;font-style:italic}
.mistake-row .mlabel{font-size:11px;color:var(--text-3)}
.mistake-row .myou{color:#A32D2D}
.mistake-row .mcorrect{color:#3B6D11;font-weight:500}

/* Auto-advance progress bar */
.auto-bar-wrap{margin-top:8px;height:3px;background:var(--surface-2);border-radius:2px;overflow:hidden}
.auto-bar{height:100%;width:100%;background:#185FA5;transform-origin:left;animation:autoBarShrink 2s linear forwards}
.auto-bar.bad{background:#A32D2D}
@keyframes autoBarShrink{from{transform:scaleX(1)}to{transform:scaleX(0)}}

/* ====== WAITING ROOM ====== */
.waiting{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:2rem 1.5rem;text-align:center}
.waiting .label{font-size:13px;color:var(--text-3);margin-bottom:8px}
.code-display{font-size:42px;font-weight:500;letter-spacing:0.18em;color:#185FA5;margin-bottom:12px;font-family:'SF Mono',Menlo,monospace}
.share-row{display:inline-flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;justify-content:center}
.share-btn{padding:8px 14px;border-radius:var(--radius);border:0.5px solid var(--border-2);background:var(--surface-2);font-size:13px;cursor:pointer;color:var(--text);font-family:inherit}
.share-btn:hover{background:#E8E5DA}
.share-btn.copied{background:#EAF3DE;color:#27500A;border-color:#639922}
.status-row{display:flex;align-items:center;justify-content:center;gap:8px;font-size:13px;color:var(--text-3);margin-bottom:0.75rem}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#BA7517;animation:pulse 1.4s ease-in-out infinite}
.status-dot.online{background:#639922;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.cancel-btn{margin-top:1rem;padding:8px 18px;border-radius:var(--radius);border:0.5px solid var(--border-2);background:transparent;font-size:13px;cursor:pointer;color:var(--text-2);font-family:inherit}
.cancel-btn:hover{background:var(--surface-2)}

/* ====== ERROR / NOTICE ====== */
.notice{background:#FCEBEB;border:0.5px solid #F09595;color:#791F1F;padding:10px 14px;border-radius:var(--radius);font-size:13px;margin-bottom:1rem;text-align:center}
.notice.warn{background:#FAEEDA;border-color:#FAC775;color:#633806}
.notice.info{background:#E6F1FB;border-color:#B5D4F4;color:#0C447C}

/* ====== GAME ====== */
.progress-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:0 4px}
.progress-row .card-num{font-size:13px;color:var(--text-3)}
.progress-row .card-num strong{color:var(--text);font-weight:500}
.opponent-status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-3)}

.flashcard{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:2rem 1.5rem;text-align:center;margin-bottom:1rem;display:flex;flex-direction:column;align-items:center;gap:10px;min-height:200px;justify-content:center}
.top-badges{display:flex;gap:6px;align-items:center;justify-content:center;flex-wrap:wrap}
.cat-badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500}
.cb-classroom{background:#FAEEDA;color:#633806}
.cb-commands{background:#FAEEDA;color:#854F0B}
.cb-people{background:#EEEDFE;color:#3C3489}
.cb-identify{background:#E6F1FB;color:#0C447C}
.cb-describe{background:#FBEAF0;color:#72243E}
.cb-colors{background:#EAF3DE;color:#27500A}
.cb-clothing{background:#E6F1FB;color:#0C447C}
.cb-numbers{background:#FAEEDA;color:#633806}
.cb-greetings{background:#EEEDFE;color:#3C3489}
.cb-useful{background:#EAF3DE;color:#27500A}
.cb-etre{background:#FCEBEB;color:#791F1F}
.cb-articles{background:#E6F1FB;color:#0C447C}
.gender-badge{font-size:12px;padding:4px 12px;border-radius:20px;font-weight:600;letter-spacing:0.02em}
.gb-m{background:#185FA5;color:#fff}
.gb-f{background:#D4537E;color:#fff}
.gb-both{background:#534AB7;color:#fff}
.prompt-label{font-size:12px;color:var(--text-3);letter-spacing:0.04em}
.prompt{font-size:22px;font-weight:500;color:var(--text)}
.hint{font-size:13px;color:var(--text-2);margin-top:-4px;font-weight:500}
.hint.hint-m{color:#185FA5}
.hint.hint-f{color:#A32D2D}
.input-row{display:flex;gap:8px;width:100%}
.input-row input{flex:1;font-size:15px;padding:10px 14px;border-radius:var(--radius);border:0.5px solid var(--border-2);background:var(--surface);color:var(--text);outline:none;font-family:inherit}
.input-row input:focus{border-color:#185FA5;box-shadow:0 0 0 2px rgba(181,212,244,0.5)}
.input-row input.ok{border-color:#639922;background:#EAF3DE;color:#27500A}
.input-row input.bad{border-color:#E24B4A;background:#FCEBEB;color:#791F1F}
/* Accent bar */
.accent-bar{display:flex;flex-wrap:wrap;justify-content:center;gap:5px;margin-bottom:8px;width:100%}
.accent-btn{min-width:34px;height:34px;padding:0 8px;border-radius:var(--radius);border:0.5px solid var(--border-2);background:var(--surface-2);color:var(--text);font-size:15px;font-family:Georgia,"Times New Roman",serif;cursor:pointer;line-height:1;transition:background 0.1s;-webkit-tap-highlight-color:transparent}
.accent-btn:hover{background:#E8E5DA}
.accent-btn:active{background:#D6D3C8;transform:scale(0.95)}
.accent-btn:disabled{opacity:0.4;cursor:not-allowed}
.check-btn{padding:10px 18px;border-radius:var(--radius);border:0.5px solid var(--border-2);background:var(--surface-2);font-size:15px;cursor:pointer;color:var(--text);font-family:inherit}
.check-btn:hover:not(:disabled){background:#E8E5DA}
.check-btn:disabled{opacity:0.5;cursor:default}

.feedback-area{text-align:center;min-height:52px;margin-bottom:6px}
.feedback-text{font-size:15px;font-weight:500;margin-bottom:6px}
.feedback-text.good{color:#3B6D11}
.feedback-text.bad{color:#A32D2D}
.answer-box{font-size:14px;padding:7px 14px;border-radius:var(--radius);display:inline-block}
.answer-box.good{background:#EAF3DE;color:#27500A}
.answer-box.bad{background:#FCEBEB;color:#791F1F}
.next-hint{display:none}

/* Scoreboard below card */
.scoreboard{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:8px}
.score-tile{background:var(--surface-2);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px 14px}
.score-tile.you{background:#E6F1FB;border-color:#185FA5;text-align:left}
.score-tile.them{text-align:right}
.score-tile .who{font-size:11px;color:var(--text-3)}
.score-tile.you .who{color:#185FA5}
.score-tile .num{font-size:22px;font-weight:500}
.score-tile.you .num{color:#0C447C}
.score-tile .progress{font-size:11px;color:var(--text-3);margin-top:1px}
.score-tile.you .progress{color:#185FA5}

.live-row{display:flex;align-items:center;justify-content:center;gap:8px;font-size:12px;color:var(--text-3)}
.live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#BA7517}
.live-dot.green{background:#639922}

/* ====== RESULTS ====== */
.results{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:2rem 1.5rem;text-align:center}
.results .label{font-size:13px;color:var(--text-3);margin-bottom:4px}
.results h2{font-size:28px;font-weight:500;margin-bottom:1.25rem}
.results h2.win{color:#3B6D11}
.results h2.lose{color:#A32D2D}
.results h2.tie{color:#534AB7}
.results-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.25rem}
.result-tile{background:var(--surface-2);border-radius:var(--radius);padding:14px}
.result-tile.you{background:#E6F1FB}
.result-tile .who{font-size:11px;color:var(--text-3)}
.result-tile.you .who{color:#185FA5}
.result-tile .score{font-size:28px;font-weight:500}
.result-tile.you .score{color:#0C447C}
.result-tile .score-total{font-size:14px;color:var(--text-3);font-weight:400}
.result-tile.you .score-total{color:#185FA5}
.result-tile .stat{font-size:12px;color:var(--text-3);margin-top:2px}
.result-tile.you .stat{color:#185FA5}
.results-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.results-actions button{padding:10px 14px;border-radius:var(--radius);border:0.5px solid var(--border-2);font-size:14px;cursor:pointer;font-family:inherit;color:var(--text)}
.results-actions button.primary{background:#185FA5;color:#fff;border-color:#185FA5}
.results-actions button.primary:hover{background:#0C447C}
.results-actions button:not(.primary){background:var(--surface)}
.results-actions button:not(.primary):hover{background:var(--surface-2)}

.review-section{margin-top:1.5rem;text-align:left}
.review-section h3{font-size:13px;font-weight:500;color:var(--text-2);margin-bottom:8px}
.review-item{background:var(--surface);border:0.5px solid #F09595;border-radius:var(--radius);padding:10px 14px;margin-bottom:6px;font-size:13px}
.review-item .rq{font-size:12px;color:var(--text-3);margin-bottom:4px;font-style:italic}
.review-item .ryou{color:#A32D2D}
.review-item .rcorrect{color:#3B6D11;font-weight:500}

@media (max-width:480px){
  .wrap{padding:1rem 0.75rem 2rem}
  .lobby,.waiting,.flashcard,.results{padding:1.5rem 1.25rem}
  .lobby-grid{grid-template-columns:1fr;gap:8px}
  .lobby-card{min-height:auto;padding:12px}
  .code-display{font-size:36px}
  .prompt{font-size:20px}
}

/* ====== ÉTAPE TABS ====== */
.etape-tabs{display:flex;gap:2px;align-items:flex-end;border-bottom:0.5px solid var(--border);padding:0 2px;margin-bottom:1.25rem;overflow-x:auto;-webkit-overflow-scrolling:touch}
.etape-tab{padding:9px 18px 10px;font-size:13px;font-weight:500;color:var(--text-3);background:transparent;border:0.5px solid transparent;border-bottom:none;border-radius:var(--radius) var(--radius) 0 0;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:7px;line-height:1;text-decoration:none;white-space:nowrap;transition:background 0.15s,color 0.15s}
.etape-tab:hover{color:var(--text-2);background:rgba(0,0,0,0.025)}
.etape-tab.active{background:var(--bg);color:var(--text);border-color:var(--border);margin-bottom:-0.5px;cursor:default}
.etape-tab.active:hover{background:var(--bg)}
.etape-tab .e-num{font-size:10px;font-weight:500;color:var(--text-3);background:rgba(0,0,0,0.06);padding:2px 7px;border-radius:999px;letter-spacing:0.02em}
.etape-tab.active .e-num{color:#fff;background:#185FA5}
.flashcard{position:relative}
.answer-box{display:inline-flex;align-items:center;gap:4px}
.mcorrect-row{display:flex;align-items:center;gap:4px}
.audio-announce{max-width:580px;margin:0 auto 1rem;padding:0;position:sticky;top:0;z-index:20}
.audio-announce-inner{display:flex;align-items:center;gap:10px;background:#EAF4E8;border:0.5px solid #A8D5A2;border-radius:10px;padding:10px 14px;font-size:13px;color:#2D6B27}
.audio-announce-inner .aa-icon{font-size:1.3em;flex-shrink:0}
.audio-announce-inner .aa-text{flex:1;font-weight:500}
.audio-announce-inner .aa-sub{font-weight:400;opacity:0.8;margin-left:4px}
.audio-dismiss{background:none;border:none;cursor:pointer;font-size:16px;color:#2D6B27;opacity:0.6;padding:0 2px;line-height:1;flex-shrink:0}
.audio-dismiss:hover{opacity:1}
</style>
<style>.mute-btn{display:none!important}.speaker-btn{display:none!important}</style>
<style>
/* ====== 2-6 PLAYER MULTIPLAYER ====== */
.scoreboard,.results-grid{grid-template-columns:repeat(auto-fit,minmax(135px,1fr))}
.score-tile.them{text-align:left}
.player-ready-list{display:grid;gap:8px;margin:1.25rem auto;max-width:560px;text-align:left}
.player-ready-row{display:flex;justify-content:space-between;align-items:center;gap:14px;padding:11px 13px;border:0.5px solid var(--border);border-radius:var(--radius);background:var(--surface-2)}
.player-ready-row.ready{background:#EAF4E8;border-color:#97C88D}
.player-ready-row.joined{background:#FFF7E6;border-color:#E8C46A}
.player-ready-row.empty{opacity:.7}
.player-ready-name{font-size:13px;font-weight:600;color:var(--text)}
.player-ready-state{font-size:12px;color:var(--text-3);text-align:right}
.player-ready-row.ready .player-ready-state{color:#2D6B27;font-weight:600}
.player-ready-row.joined .player-ready-state{color:#8A5A00}
.you-tag{display:inline-block;margin-left:5px;padding:2px 7px;border-radius:999px;background:#E6F1FB;color:#0C447C;font-size:10px;font-weight:700}
.ready-btn{min-width:180px;margin:0 auto 10px;padding:11px 18px;border:0;border-radius:var(--radius);background:#185FA5;color:#fff;font:600 14px inherit;cursor:pointer}
.ready-btn:hover{background:#0C447C}
.ready-btn.is-ready{background:#3B6D11}
.result-tile{position:relative;text-align:left}
.result-tile .rank{position:absolute;right:10px;top:8px;font-size:11px;font-weight:700;color:var(--text-3)}
@media(max-width:560px){.player-ready-row{align-items:flex-start;flex-direction:column;gap:4px}.player-ready-state{text-align:left}.scoreboard,.results-grid{grid-template-columns:1fr 1fr}}
</style>
</head>

<script>
(function bootEtape(){
  // This page is the Étape 2 (default) page. The other étape lives in etape1.html.
  // Map each étape id -> the file that hosts its multiplayer lobby.
  window.CURRENT_ETAPE_ID = 'e1';
 window.ETAPE_PAGE_MAP = {
  e1: 'etape1.html',
  e2: 'index.html',
  e3: 'etape3.html',
  e4: 'etape4.html'
};

window.ETAPE_SOLO_MAP = {
  e1: 'solo1.html',
  e2: 'solo.html',
  e3: 'solo3.html',
  e4: 'solo4.html'
};

  // Render the tab bar from the registry. Adding Étape 3 later means:
  //   1. add an entry to registry.js
  //   2. add 'e3' to ETAPE_PAGE_MAP and ETAPE_SOLO_MAP in each shell
  //   3. create etape3.html and solo3.html (copies of these shells with one line changed)
  const tabsEl = document.getElementById('etape-tabs');
  tabsEl.innerHTML = window.ETAPES.map(e => {
    const isActive = e.id === window.CURRENT_ETAPE_ID;
    const href = window.ETAPE_PAGE_MAP[e.id] || '#';
    if(isActive){
      return `<span class="etape-tab active" aria-current="page">${e.label} <span class="e-num">${e.sublabel}</span></span>`;
    }
    return `<a class="etape-tab" href="${href}">${e.label} <span class="e-num">${e.sublabel}</span></a>`;
  }).join('');

  // Set the title from the registry
  const me = window.ETAPES.find(e => e.id === window.CURRENT_ETAPE_ID);
  if(me){
    document.getElementById('app-title-h1').textContent = me.titleMulti;
    document.getElementById('app-title-sub').textContent = me.sub;
    document.title = me.titleMulti;
  }
})();
</script>

function clampPlayerCount(value){
  const n = Number.parseInt(value, 10);
  return Number.isInteger(n) ? Math.min(6, Math.max(2, n)) : 2;
}
const CONFIGURED_PLAYER_COUNT = clampPlayerCount(window.MULTIPLAYER_CONFIG?.playerCount);

function gameModeLabel(count){
  return count === 2 ? '1v1' : `${count}-Player`;
}
function playerKey(number){ return `p${number}`; }
function roleNumber(){ return role ? Number.parseInt(role.slice(1), 10) : 0; }
function activePlayerNumbers(data){
  const count = clampPlayerCount(data?.requiredPlayers ?? matchPlayerCount);
  return Array.from({length:count}, (_,i)=>i+1);
}
function allRequiredPlayersJoinedAndReady(data){
  return activePlayerNumbers(data).every(i => data[`${playerKey(i)}Joined`] === true && data[`${playerKey(i)}Ready`] === true);
}
function allRequiredPlayersDone(data){
  return activePlayerNumbers(data).every(i => data[`${playerKey(i)}Done`] === true);
}
function ordinal(n){
  const mod10=n%10, mod100=n%100;
  if(mod10===1 && mod100!==11)return `${n}st`;
  if(mod10===2 && mod100!==12)return `${n}nd`;
  if(mod10===3 && mod100!==13)return `${n}rd`;
  return `${n}th`;
}

const accentMap=[[/[àâä]/g,'a'],[/[éèêë]/g,'e'],[/[îï]/g,'i'],[/[ôö]/g,'o'],[/[ùûü]/g,'u'],[/ç/g,'c'],[/œ/g,'oe']];
function normaliseBase(s){return String(s??'').toLowerCase().trim().replace(/[\u2018\u2019'`]/g,"'").replace(/[?!.\u2026]/g,'').replace(/\s+/g,' ').trim();}
function stripAccents(s){let r=s;accentMap.forEach(([p,rep])=>r=r.replace(p,rep));return r;}
function isCorrect(typed,v){
  const t=normaliseBase(typed);
  return v.alts.some(answer=>{
    const a=normaliseBase(answer);
    const tH=v.needsHyphen?t:t.replace(/-/g,' ');
    const aH=v.needsHyphen?a:a.replace(/-/g,' ');
    return tH===aH;
  });
}
function isWrongArticle(typed,v){
  if(!v.guessGender)return false;
  const t=normaliseBase(typed),a=normaliseBase(v.alts[0]);
  const swaps=[[/^un /,'une '],[/^une /,'un '],[/^le /,'la '],[/^la /,'le ']];
  for(const[from,to]of swaps){
    if(from.test(t) && stripAccents(t.replace(from,to))===stripAccents(a))return true;
  }
  return false;
}
function isWrongGender(typed,v){
  if(v.gender!=='m'&&v.gender!=='f')return false;
  const opposite=v.gender==='m'?'f':'m';
  const coreA=v.en.replace(/\s*\(.*?\)\s*/g,'').trim().toLowerCase();
  const idxA=vocab.indexOf(v);
  for(const other of vocab){
    if(other.gender!==opposite || other.category!==v.category)continue;
    const coreB=other.en.replace(/\s*\(.*?\)\s*/g,'').trim().toLowerCase();
    let related=(coreA===coreB);
    if(!related && Math.abs(idxA-vocab.indexOf(other))<=2)related=true;
    if(!related)continue;
    const matches=other.alts.some(answer=>{
      const a=normaliseBase(answer);
      const aH=other.needsHyphen?a:a.replace(/-/g,' ');
      const tH=other.needsHyphen?normaliseBase(typed):normaliseBase(typed).replace(/-/g,' ');
      return stripAccents(tH)===stripAccents(aH);
    });
    if(matches)return true;
  }
  return false;
}
function getMissing(typed,v){
  const t=normaliseBase(typed),answer=normaliseBase(v.alts[0]),msgs=[];
  if(isWrongArticle(typed,v)){
    msgs.push(v.gender==='m'?'wrong article — should be MASCULINE (un/le)':'wrong article — should be FEMININE (une/la)');
    return msgs;
  }
  if(isWrongGender(typed,v)){
    msgs.push(v.gender==='m'?'that is the FEMININE form, need MASCULINE':'that is the MASCULINE form, need FEMININE');
    return msgs;
  }
  if(v.needsHyphen){
    const tH=(t.match(/-/g)||[]).length,aH=(answer.match(/-/g)||[]).length;
    if(tH!==aH)msgs.push('missing hyphen(s)');
  }
  if(stripAccents(t)===stripAccents(answer)&&msgs.length===0)msgs.push('check accents');
  return msgs;
}
function escH(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function rand4(){
  const ch='ABCDEFGHJKLMNPQRSTUVWXYZ';
  let s='';for(let i=0;i<4;i++)s+=ch[Math.floor(Math.random()*ch.length)];
  return s;
}
function pickMatchCards(category, length){
  let pool = vocab.slice();
  if(category && category !== 'all') pool = pool.filter(v => v.category === category);
  if(pool.length === 0) pool = vocab.slice();
  const result = [];
  const shuffled = pool.slice();
  for(let i=shuffled.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]];
  }
  let cursor = 0;
  let pass = shuffled.slice();
  while(result.length < length){
    if(cursor >= pass.length){
      const last = result[result.length-1];
      pass = pool.slice();
      for(let i=pass.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [pass[i],pass[j]]=[pass[j],pass[i]];
      }
      if(pass.length > 1 && pass[0] === last)[pass[0],pass[1]]=[pass[1],pass[0]];
      cursor = 0;
    }
    result.push(pass[cursor++]);
  }
  return result.map(v => vocab.indexOf(v));
}
function show(screen){
  ['lobby','waiting','game','results'].forEach(s=>{
    document.getElementById('screen-'+s).style.display=(s===screen?'block':'none');
  });
}
function isScreenVisible(name){
  const el=document.getElementById(`screen-${name}`);
  return el && el.style.display !== 'none';
}
function emptyPlayerFields(requiredPlayers){
  const fields={};
  for(let i=1;i<=6;i++){
    const key=playerKey(i);
    fields[`${key}Joined`]=i===1;
    fields[`${key}Ready`]=false;
    fields[`${key}Score`]=0;
    fields[`${key}Done`]=false;
    fields[`${key}Time`]=0;
    fields[`${key}CurrentCard`]=0;
    fields[`${key}Id`]=i===1?playerId:'';
  }
  fields.requiredPlayers=requiredPlayers;
  return fields;
}

// ====== CREATE MATCH ======
async function createMatch(){
  let length = selectedCategory === 'all' ? selectedLength : MIN_LENGTH;
  matchLength = length;
  matchCategory = selectedCategory;
  matchPlayerCount = CONFIGURED_PLAYER_COUNT;
  const cards = pickMatchCards(selectedCategory, length);
  myCards = cards.map(i => vocab[i]);

  for(let attempt=0;attempt<8;attempt++){
    const code=rand4();
    const ref=doc(db,'matches',code);
    try{
      const createdData={
        createdAt: serverTimestamp(), lastUpdate: serverTimestamp(), status:'waiting',
        etape: window.CURRENT_ETAPE_ID, cards, length, category:selectedCategory,
        ...emptyPlayerFields(matchPlayerCount)
      };
      await runTransaction(db,async tx=>{
        const snap=await tx.get(ref);
        if(snap.exists())throw new Error('CODE_COLLISION');
        tx.set(ref,createdData);
      });
      matchId=code;role='p1';latestMatchData=createdData;
      if(typeof window.dismissAnnounce==='function')window.dismissAnnounce();
      listenToMatch();
      renderWaiting(createdData);
      return;
    }catch(e){
      if(e?.message==='CODE_COLLISION')continue;
      console.error(e);
      const firebaseDetail = e?.code || e?.message || 'unknown Firebase error';
      renderLobby(`Could not create match. Firebase reported: ${firebaseDetail}`);
      return;
    }
  }
  renderLobby('Could not create a unique match code. Please try again.');
}

// ====== JOIN MATCH ======
async function joinMatch(code){
  code=code.toUpperCase();
  try{
    const ref=doc(db,'matches',code);
    const firstSnap=await getDoc(ref);
    if(!firstSnap.exists()){renderLobby('Match code not found. Check with the host.');return;}
    const firstData=firstSnap.data();
    const matchEtape=firstData.etape||'e1';
    if(matchEtape!==window.CURRENT_ETAPE_ID){
      const targetPage=window.ETAPE_PAGE_MAP[matchEtape];
      if(targetPage){window.location.href=targetPage+'?code='+code;return;}
      renderLobby('That code is for a different unit that this page cannot open.');return;
    }

    let assignedRole=null;
    await runTransaction(db,async tx=>{
      const snap=await tx.get(ref);
      if(!snap.exists())throw new Error('NOT_FOUND');
      const data=snap.data();
      const count=clampPlayerCount(data.requiredPlayers);
      const existing=activePlayerNumbers(data).find(i=>data[`${playerKey(i)}Id`]===playerId);
      if(existing){assignedRole=playerKey(existing);return;}
      if(data.status!=='waiting')throw new Error(data.status==='resigned'?'RESIGNED':'STARTED');
      const open=Array.from({length:count-1},(_,i)=>i+2).find(i=>data[`${playerKey(i)}Joined`]!==true);
      if(!open)throw new Error('FULL');
      assignedRole=playerKey(open);
      tx.update(ref,{
        [`${assignedRole}Joined`]:true,
        [`${assignedRole}Ready`]:false,
        [`${assignedRole}Id`]:playerId,
        lastUpdate:serverTimestamp()
      });
    });

    const snap=await getDoc(ref);
    if(!snap.exists())throw new Error('NOT_FOUND');
    const data=snap.data();
    if(data.status==='done')throw new Error('DONE');
    if(data.status==='resigned')throw new Error('RESIGNED');
    matchId=code;role=assignedRole;latestMatchData=data;
    matchPlayerCount=clampPlayerCount(data.requiredPlayers);
    matchLength=data.length||data.cards.length;
    matchCategory=data.category||'all';
    myCards=data.cards.map(i=>vocab[i]);
    if(typeof window.dismissAnnounce==='function')window.dismissAnnounce();
    listenToMatch();
    if(data.status==='playing')startGame(); else renderWaiting(data);
  }catch(e){
    console.error(e);
    const messages={
      NOT_FOUND:'Match code not found.', FULL:'That match already has all of its players.',
      STARTED:'That match has already started.', DONE:'That match is already over.', RESIGNED:'That match has ended because a player resigned.'
    };
    renderLobby(messages[e?.message]||'Could not join match. Check your internet connection, the code, and Firestore rules.');
  }
}

// ====== WAITING ROOM ======
function waitingStatusText(data){
  const nums=activePlayerNumbers(data);
  const joined=nums.filter(i=>data[`${playerKey(i)}Joined`]===true).length;
  const ready=nums.filter(i=>data[`${playerKey(i)}Ready`]===true).length;
  if(joined<nums.length)return `Waiting for ${nums.length-joined} more ${nums.length-joined===1?'player':'players'} to join…`;
  if(ready<nums.length)return `All players joined. Waiting for ${nums.length-ready} more ${nums.length-ready===1?'player':'players'} to press Ready…`;
  return 'Everyone is ready. Starting the game…';
}
function playerReadyRows(data){
  return activePlayerNumbers(data).map(i=>{
    const key=playerKey(i), joined=data[`${key}Joined`]===true, ready=data[`${key}Ready`]===true;
    const you=key===role?' <span class="you-tag">You</span>':'';
    let stateClass='empty',stateText=`Waiting for Player ${i}`;
    if(joined&&!ready){stateClass='joined';stateText=`Player ${i} joined — not ready`;}
    if(joined&&ready){stateClass='ready';stateText=`Player ${i} is ready`;}
    return `<div class="player-ready-row ${stateClass}"><div class="player-ready-name">Player ${i}${you}</div><div class="player-ready-state">${stateText}</div></div>`;

}

async function copyText(text,btn){
  try{
    await navigator.clipboard.writeText(text);
    const orig=btn.textContent;btn.textContent='Copied ✓';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent=orig;btn.classList.remove('copied');},1500);
  }catch(e){prompt('Copy this:',text);}
}
async function toggleReady(){
  if(!matchId||!role)return;
  const ref=doc(db,'matches',matchId);
  try{
    await runTransaction(db,async tx=>{
      const snap=await tx.get(ref);
      if(!snap.exists())throw new Error('NOT_FOUND');
      const data=snap.data();
      if(data.status!=='waiting')return;
      const joined=data[`${role}Joined`]===true;
      if(!joined)throw new Error('NOT_JOINED');
      const nextReady=data[`${role}Ready`]!==true;
      const proposed={...data,[`${role}Ready`]:nextReady};
      const update={ [`${role}Ready`]:nextReady,lastUpdate:serverTimestamp() };
      if(nextReady&&allRequiredPlayersJoinedAndReady(proposed))update.status='playing';
      tx.update(ref,update);
    });
  }catch(e){
    console.error(e);
    alert('Could not update your ready status. Check the Firestore rules and try again.');
  }
}
async function leaveWaitingRoom(){
  if(!matchId||!role){renderLobby();return;}
  if(unsubscribe){unsubscribe();unsubscribe=null;}
  const oldMatchId=matchId,oldRole=role;
  try{
    const ref=doc(db,'matches',oldMatchId);
    if(oldRole==='p1'){
      await deleteDoc(ref);
    }else{
      await updateDoc(ref,{
        [`${oldRole}Joined`]:false,[`${oldRole}Ready`]:false,[`${oldRole}Id`]:'',lastUpdate:serverTimestamp()
      });
    }
  }catch(e){console.error(e);}
  resetMatchState();
  renderLobby();
}

// ====== FIREBASE LISTENER ======
function listenToMatch(){
  if(unsubscribe)unsubscribe();
  unsubscribe=onSnapshot(doc(db,'matches',matchId),snap=>{
    if(!snap.exists()){
      if(unsubscribe){unsubscribe();unsubscribe=null;}
      resetMatchState();
      renderLobby('The host closed the match.');
      return;
    }
    latestMatchData=snap.data();
    handleStateUpdate(latestMatchData);
  },err=>console.error('snapshot error',err));
}
function handleStateUpdate(data){
  matchPlayerCount=clampPlayerCount(data.requiredPlayers);
  matchLength=data.length||data.cards?.length||matchLength;
  matchCategory=data.category||'all';
  if(myCards.length===0&&Array.isArray(data.cards))myCards=data.cards.map(i=>vocab[i]);

  if(data.status==='waiting'){
    if(!gameStarted)renderWaiting(data);
    return;
  }
  if(data.status==='playing'){
    if(!gameStarted)startGame();
    updateLiveScoreboard(data);
    if(myCards.length>0&&allRequiredPlayersDone(data))showResults(data);
    return;
  }
  if(data.status==='resigned'&&!resultsShown){
    if(autoTimer){clearTimeout(autoTimer);autoTimer=null;}
    showResignedScreen(data);
    return;
  }
  if(data.status==='done'&&!resultsShown&&!isScreenVisible('lobby')){
    resetMatchState();
    renderLobby('That match has been closed.');
  }
}

async function resignMatch(){
  if(!matchId)return;
  if(!confirm('Resign this match? The match will end for every player.'))return;
  if(autoTimer){clearTimeout(autoTimer);autoTimer=null;}
  try{
    await updateDoc(doc(db,'matches',matchId),{status:'resigned',resignedBy:roleNumber(),lastUpdate:serverTimestamp()});
  }catch(e){console.error(e);alert('Could not resign. Check your internet connection.');}
}
function buildLeaderboard(data){
  return activePlayerNumbers(data).map(i=>{
    const key=playerKey(i);
    return {number:i,key,score:data[`${key}Score`]||0,time:data[`${key}Time`]||0,done:data[`${key}Done`]===true};
  }).sort((a,b)=>b.score-a.score || (a.time||Number.MAX_SAFE_INTEGER)-(b.time||Number.MAX_SAFE_INTEGER) || a.number-b.number);
}
function leaderboardTiles(data,{resigned=false}={}){
  const board=buildLeaderboard(data);
  const resignedNumber=Number(data.resignedBy||0);
  return board.map((p,index)=>{
    const avg=p.time?((p.time/1000)/matchLength).toFixed(1):'—';
    const stat=resigned&&p.number===resignedNumber?'Resigned':(p.done?`avg ${avg}s per card`:'Not finished');
    return `<div class="result-tile${p.key===role?' you':''}"><div class="rank">#${index+1}</div><div class="who">Player ${p.number}${p.key===role?' · You':''}</div><div class="score">${p.score}<span class="score-total">/${matchLength}</span></div><div class="stat">${stat}</div></div>`;
  }).join('');
}
function showResignedScreen(data){
  resultsShown=true;gameStarted=false;
  if(unsubscribe){unsubscribe();unsubscribe=null;}
  const resignedNumber=Number(data.resignedBy||0);
  const youResigned=resignedNumber===roleNumber();
  const el=document.getElementById('screen-results');
  el.innerHTML=`<div class="results"><div class="label">Match ended</div><h2 class="${youResigned?'lose':''}">${youResigned?'You resigned':`Player ${resignedNumber} resigned`}</h2><p style="font-size:13px;color:var(--text-2);margin-bottom:1.25rem">The current leaderboard is shown below.</p><div class="results-grid">${leaderboardTiles(data,{resigned:true})}</div><div class="results-actions"><button class="primary" id="back-lobby">Back to lobby</button></div>${myMistakes.length?renderMistakesReview():''}</div>`;
  document.getElementById('back-lobby').addEventListener('click',backToLobby);
  show('results');
}

// ====== START GAME ======
function startGame(){
  if(gameStarted)return;
  gameStarted=true;resultsShown=false;
  myIndex=0;myScore=0;myMistakes=[];myTotalTime=0;
  if(autoTimer){clearTimeout(autoTimer);autoTimer=null;}
  renderGame(latestMatchData);
  show('game');
}
function scoreTiles(data={}){
  return activePlayerNumbers(data).map(i=>{
    const key=playerKey(i),isYou=key===role;
    const score=isYou?myScore:(data[`${key}Score`]||0);
    const done=data[`${key}Done`]===true;
    const current=isYou?Math.min(myIndex+1,matchLength):(data[`${key}CurrentCard`]||0);
    const progress=done?'Done':(current>0?`Card ${current}/${matchLength}`:'Starting…');
    return `<div class="score-tile${isYou?' you':' them'}" id="player-tile-${i}"><div class="who">Player ${i}${isYou?' · You':''}</div><div class="num" id="player-score-${i}">${score}</div><div class="progress" id="player-progress-${i}">${progress}</div></div>`;
  }).join('');
}
function renderGame(data={}){
  const el=document.getElementById('screen-game');
  el.innerHTML=`
    <div class="progress-row"><div class="card-num">Card <strong id="g-cardnum">1</strong>/<span>${matchLength}</span></div><div class="opponent-status" id="opp-status"><span class="live-dot green"></span><span id="opp-name-text">${matchPlayerCount} players · online</span></div></div>
    <div class="flashcard"><div class="top-badges" id="top-badges"></div><div class="prompt-label">True or false?</div><div class="prompt" id="prompt"></div><div class="hint" id="hint"></div><div class="accent-bar" id="accent-bar"></div><div class="input-row"><input type="text" id="answer-input" placeholder="Type True or False…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" /><button class="check-btn" id="check-btn">Check</button></div></div>
    <div class="feedback-area"><div class="feedback-text" id="feedback"></div><div id="answer-box-wrap"></div></div>
    <div class="scoreboard" id="multiplayer-scoreboard">${scoreTiles(data)}</div>
    <div class="live-row" id="live-row"><span class="live-dot green"></span><span id="live-text">Game on · ${matchPlayerCount} players</span></div>
    <div class="mistakes-panel" id="mistakes-panel" style="display:none"><div class="mistakes-panel-header">Mistakes so far <span class="mistakes-panel-badge" id="mistakes-panel-count">0</span></div><div id="mistakes-panel-list"></div></div>
    <div style="text-align:center;margin-top:1.5rem"><button class="cancel-btn" id="btn-resign">Resign match</button></div>`;
  document.getElementById('check-btn').addEventListener('click',checkAnswer);
  const inp=document.getElementById('answer-input');
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!answered)checkAnswer();});
  document.getElementById('btn-resign').addEventListener('click',resignMatch);
  buildAccentBar(inp);
  showCard();
  setTimeout(()=>{if(typeof window.applyMuteUI==='function')window.applyMuteUI();},0);
}

const ACCENT_CHARS = [];
function buildAccentBar(inputEl){
  const bar=document.getElementById('accent-bar');
  if(!bar)return;
  bar.innerHTML='';
  ACCENT_CHARS.forEach(ch=>{
    const btn=document.createElement('button');btn.type='button';btn.className='accent-btn';btn.textContent=ch;btn.tabIndex=-1;
    btn.addEventListener('mousedown',e=>e.preventDefault());btn.addEventListener('click',()=>insertAccent(inputEl,ch));bar.appendChild(btn);
  });
}
function insertAccent(inputEl,ch){
  if(!inputEl||inputEl.disabled)return;
  const start=inputEl.selectionStart??inputEl.value.length,end=inputEl.selectionEnd??inputEl.value.length;
  inputEl.value=inputEl.value.slice(0,start)+ch+inputEl.value.slice(end);
  inputEl.setSelectionRange(start+ch.length,start+ch.length);inputEl.focus();
}

let answered=false;
function showCard(){
  if(myIndex>=myCards.length){finishMatch();return;}
  answered=false;
  const v=myCards[myIndex];
  myStartTime=Date.now();
  document.getElementById('g-cardnum').textContent=myIndex+1;
  const ownProgress=document.getElementById(`player-progress-${roleNumber()}`);
  if(ownProgress)ownProgress.textContent=`Card ${myIndex+1}/${matchLength}`;
  const badges=document.getElementById('top-badges');badges.innerHTML='';
  const labels={systems:'Linear Systems',span:'Span',independence:'Independence',matrices:'Matrices',inverses:'Inverses',lu:'LU',determinants:'Determinants',transformations:'Transformations',subspaces:'Subspaces',eigenvalues:'Eigenvalues',markov:'Markov'};
  badges.innerHTML=`<span class="cat-badge cb-${v.category}">${labels[v.category]||v.category}</span>`;
  document.getElementById('prompt').textContent=v.en;
  const hintEl=document.getElementById('hint');hintEl.textContent='Answer with True or False.';hintEl.className='hint';
  const inp=document.getElementById('answer-input');inp.value='';inp.className='';inp.disabled=false;
  document.getElementById('check-btn').disabled=false;
  document.getElementById('feedback').textContent='';document.getElementById('feedback').className='feedback-text';
  document.getElementById('answer-box-wrap').innerHTML='';
  setTimeout(()=>inp.focus(),50);
}
async function checkAnswer(){
  if(answered)return;
  const typed=document.getElementById('answer-input').value.trim();
  if(!typed)return;
  answered=true;
  myTotalTime+=Date.now()-myStartTime;
  const v=myCards[myIndex],ok=isCorrect(typed,v);
  const inp=document.getElementById('answer-input');inp.disabled=true;inp.classList.add(ok?'ok':'bad');
  document.getElementById('check-btn').disabled=true;
  let extraMsg='';
  if(!ok){
    const missing=getMissing(typed,v);if(missing.length)extraMsg=missing.join(', ');
    myMistakes.push({question:v.en,typed,correct:v.fr});appendMistakeRow(v.en,typed,v.fr);
  }
  if(ok)myScore++;
  const fb=document.getElementById('feedback');fb.textContent=ok?'Correct!':(extraMsg?'Wrong — '+extraMsg:'Wrong!');fb.className='feedback-text '+(ok?'good':'bad');
  const wrap=document.getElementById('answer-box-wrap');
  const box=document.createElement('div');box.className='answer-box '+(ok?'good':'bad');box.textContent='Answer: '+v.fr;wrap.appendChild(box);
  if(v.explanation){const e=document.createElement('div');e.style.cssText='font-size:13px;color:#5F5E5A;padding:6px 14px 2px;line-height:1.5;border-top:0.5px solid rgba(0,0,0,0.08);margin-top:4px';e.textContent=v.explanation;wrap.appendChild(e);}
  const barWrap=document.createElement('div');barWrap.className='auto-bar-wrap';barWrap.innerHTML=`<div class="auto-bar${ok?'':' bad'}"></div>`;wrap.appendChild(barWrap);
  const ownScore=document.getElementById(`player-score-${roleNumber()}`);if(ownScore)ownScore.textContent=myScore;
  if(autoTimer)clearTimeout(autoTimer);
  autoTimer=setTimeout(()=>{autoTimer=null;nextCard();},2000);
  if(matchId){
    const update={};update[`${role}Score`]=myScore;update[`${role}CurrentCard`]=Math.min(myIndex+1,matchLength);
    updateDoc(doc(db,'matches',matchId),update).catch(e=>console.error('score update failed',e));
  }
}
function appendMistakeRow(question,typed,correct){
  const panel=document.getElementById('mistakes-panel');if(!panel)return;
  panel.style.display='block';document.getElementById('mistakes-panel-count').textContent=myMistakes.length;
  const row=document.createElement('div');row.className='mistake-row';
  row.innerHTML=`<div class="mq">${escH(question)}</div><div><div class="mlabel">You wrote</div><div class="myou">${escH(typed||'—')}</div></div><div><div class="mlabel">Correct answer</div><div class="mcorrect-row"><div class="mcorrect">${escH(correct)}</div></div></div>`;
  document.getElementById('mistakes-panel-list').appendChild(row);
}
function nextCard(){myIndex++;if(myIndex>=myCards.length){finishMatch();return;}showCard();}

async function finishMatch(){
  const el=document.getElementById('screen-game');
  const data={...(latestMatchData||{}),[`${role}Score`]:myScore,[`${role}Done`]:true,[`${role}Time`]:myTotalTime,[`${role}CurrentCard`]:matchLength};
  latestMatchData=data;
  el.innerHTML=`<div class="flashcard"><div class="prompt">You are done!</div><div class="hint">Score: ${myScore}/${matchLength}</div></div><div class="scoreboard" id="multiplayer-scoreboard">${scoreTiles(data)}</div><div class="live-row"><span class="live-dot"></span><span id="live-text">Waiting for the other players to finish…</span></div>`;
  try{
    const update={};update[`${role}Done`]=true;update[`${role}Score`]=myScore;update[`${role}Time`]=myTotalTime;update[`${role}CurrentCard`]=matchLength;update.lastUpdate=serverTimestamp();
    await updateDoc(doc(db,'matches',matchId),update);
  }catch(e){console.error(e);}
}
function updateLiveScoreboard(data){
  activePlayerNumbers(data).forEach(i=>{
    const key=playerKey(i),score=data[`${key}Score`]||0,done=data[`${key}Done`]===true,current=data[`${key}CurrentCard`]||0;
    const scoreEl=document.getElementById(`player-score-${i}`);if(scoreEl&&key!==role)scoreEl.textContent=score;
    const progEl=document.getElementById(`player-progress-${i}`);
    if(progEl&&key!==role)progEl.textContent=done?'Done':(current>0?`Card ${current}/${matchLength}`:'Playing…');
  });
  const doneCount=activePlayerNumbers(data).filter(i=>data[`${playerKey(i)}Done`]===true).length;
  const liveText=document.getElementById('live-text');
  if(liveText)liveText.textContent=doneCount?`${doneCount}/${matchPlayerCount} players finished`:`Game on · ${matchPlayerCount} players`;
}

// ====== RESULTS ======
function showResults(data){
  if(resultsShown)return;
  resultsShown=true;gameStarted=false;
  if(unsubscribe){unsubscribe();unsubscribe=null;}
  const board=buildLeaderboard(data);
  const mineIndex=board.findIndex(p=>p.key===role);
  const mine=board[mineIndex];
  const top=board[0];
  const tiedForFirst=mineIndex===0&&board.filter(p=>p.score===top.score&&p.time===top.time).length>1;
  const heading=tiedForFirst?'You tied for 1st!':mineIndex===0?'You won! 🏆':`You placed ${ordinal(mineIndex+1)}`;
  const outcome=mineIndex===0?'win':'';
  const el=document.getElementById('screen-results');
  el.innerHTML=`<div class="results"><div class="label">Match complete · ${matchPlayerCount} players</div><h2 class="${outcome}">${heading}</h2><div class="results-grid">${leaderboardTiles(data)}</div><div class="results-actions"><button class="primary" id="rematch">New match</button><button id="new-match">Back to lobby</button></div>${myMistakes.length?renderMistakesReview():''}</div>`;
  document.getElementById('rematch').addEventListener('click',backToLobby);
  document.getElementById('new-match').addEventListener('click',backToLobby);
  show('results');
}
function renderMistakesReview(){
  return `<div class="review-section"><h3>Your mistakes (${myMistakes.length})</h3>${myMistakes.map(m=>`<div class="review-item"><div class="rq">${escH(m.question)}</div><div>You wrote <span class="ryou">${escH(m.typed||'—')}</span></div><div>Correct answer <span class="rcorrect">${escH(m.correct)}</span></div></div>`).join('')}</div>`;
}
function resetMatchState(){
  matchId=null;role=null;matchPlayerCount=CONFIGURED_PLAYER_COUNT;myCards=[];myIndex=0;myScore=0;myMistakes=[];myTotalTime=0;resultsShown=false;gameStarted=false;latestMatchData=null;
}
async function backToLobby(){
  if(unsubscribe){unsubscribe();unsubscribe=null;}
  const oldMatchId=matchId,oldRole=role;
  if(oldMatchId&&oldRole==='p1'){
    try{await updateDoc(doc(db,'matches',oldMatchId),{status:'done',lastUpdate:serverTimestamp()});}catch(e){console.error(e);}
  }
  resetMatchState();renderLobby();
}

// ====== SOLO MODE ======
function startSolo(){
  if(typeof window.dismissAnnounce==='function')window.dismissAnnounce();
  const target=(window.ETAPE_SOLO_MAP&&window.ETAPE_SOLO_MAP[window.CURRENT_ETAPE_ID])||'solo.html';
  window.location.href=target;
}

// ====== INIT ======
const params=new URLSearchParams(window.location.search);
const codeFromUrl=params.get('code');
if(codeFromUrl&&/^[A-Z]{4}$/.test(codeFromUrl.toUpperCase()))joinMatch(codeFromUrl);else renderLobby();

</script>
  <script>
// ====== AUDIO PLAYBACK ======
function audioSlug(text){
  return String(text).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/\u0153/g,"oe").replace(/\u00e6/g,"ae")
    .replace(/[^a-z0-9]+/g,"_").replace(/^_+|_+$/g,"").slice(0,80);
}
let audioMuted = localStorage.getItem('fq-muted') === '1';
let _audioEl = null;
function _playRaw(fr){
  if(!fr || audioMuted) return;
  if(_audioEl){ _audioEl.pause(); _audioEl = null; }
  _audioEl = new Audio("audio/" + audioSlug(fr) + ".mp3");
  _audioEl.play().catch(()=>{});
}
function applyMuteUI(){
  const btn = document.getElementById('mute-btn');
  if(!btn) return;
  btn.textContent = audioMuted ? '🔇' : '🔊';
  btn.classList.toggle('muted', audioMuted);
}
function toggleMute(){
  audioMuted = !audioMuted;
  localStorage.setItem('fq-muted', audioMuted ? '1' : '0');
  applyMuteUI();
}

// ====== AUDIO ANNOUNCEMENT BANNER ======
(function(){
  const el = document.getElementById('audio-announce');
  if(!el) return;
  window.dismissAnnounce = function(){
    el.style.opacity='0';
    el.style.transition='opacity .25s';
    setTimeout(()=>{ el.style.display='none'; },260);
  };
})();
  </script>
